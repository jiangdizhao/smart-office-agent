name: Virtual Host Phase 1 Check

on:
  push:
    branches:
      - integration/virtual-host
  pull_request:
    paths:
      - "backend/**"
      - "ui/smart-office-ui/**"
      - ".github/workflows/virtual-host-phase1-check.yml"

jobs:
  backend-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "fastapi[standard]" httpx sse-starlette
      - name: Compile backend
        run: python -m compileall backend/app backend/scripts/smoke_phase1_voice_contract.py
      - name: Run Phase 1 contract smoke test
        run: python backend/scripts/smoke_phase1_voice_contract.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/smart-office-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/smart-office-ui/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
