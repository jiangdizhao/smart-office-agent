name: Virtual Host Integration Check

on:
  push:
    branches:
      - integration/virtual-host
  pull_request:
    paths:
      - "backend/**"
      - "data/company_knowledge/**"
      - "ui/smart-office-ui/**"
      - ".github/workflows/virtual-host-phase1-check.yml"

jobs:
  backend-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "fastapi[standard]" httpx sse-starlette
      - name: Compile backend
        run: |
          python -m compileall backend/app \
            backend/scripts/smoke_phase1_voice_contract.py \
            backend/scripts/smoke_phase2_router_contract.py \
            backend/scripts/smoke_phase3_gate1_contract.py \
            backend/scripts/smoke_phase3_gate2a_contract.py \
            backend/scripts/smoke_phase3_gate2b_contract.py \
            backend/scripts/smoke_phase3_unified_plan_contract.py \
            backend/scripts/smoke_phase3_display2_race_contract.py \
            backend/scripts/smoke_phase3_gate3_5_contract.py \
            backend/scripts/smoke_phase3_brightness_wmi_contract.py \
            backend/scripts/setup_gmail_oauth.py
      - name: Run Phase 1 regression contract
        run: python backend/scripts/smoke_phase1_voice_contract.py
      - name: Run Phase 2 router contract
        run: python backend/scripts/smoke_phase2_router_contract.py
      - name: Run Phase 3 Gate 1 presentation contract
        run: python backend/scripts/smoke_phase3_gate1_contract.py
      - name: Run Phase 3 Gate 2A Realtime presentation contract
        run: python backend/scripts/smoke_phase3_gate2a_contract.py
      - name: Run Phase 3 unified presentation-plan contract
        run: python backend/scripts/smoke_phase3_unified_plan_contract.py
      - name: Run Phase 3 DISPLAY2 race regression contract
        run: python backend/scripts/smoke_phase3_display2_race_contract.py
      - name: Run Phase 3 Gate 3-5 office workflow contract
        run: python backend/scripts/smoke_phase3_gate3_5_contract.py
      - name: Run Phase 3 WMI brightness invocation contract
        run: python backend/scripts/smoke_phase3_brightness_wmi_contract.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/smart-office-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/smart-office-ui/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
